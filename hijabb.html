<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Alshabila Hijab Collection</title>

<style>
body{
font-family:Arial;
margin:0;
background:#fff;
}

.header{
background:#ff7f50;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.promo{
background:#ffe5d0;
overflow:hidden;
white-space:nowrap;
}

.promo span{
display:inline-block;
padding:8px 0;
animation:jalan 12s linear infinite;
font-size:14px;
}

@keyframes jalan{
from { transform: translateX(100%); }
to { transform: translateX(-100%); }
}

.container{
padding:10px;
}

.product{
display:flex;
align-items:center;
border-bottom:1px solid #ddd;
padding:10px 0;
position:relative;
}

.product img{
width:80px;
height:80px;
object-fit:cover;
margin-right:10px;
border-radius:5px;
}

.info{
flex:1;
}

.qty{
display:flex;
align-items:center;
margin-top:5px;
}

.qty button{
width:25px;
height:25px;
}

.check{
position:absolute;
right:10px;
top:10px;
color:green;
font-weight:bold;
display:none;
}

.cart-btn{
position:fixed;
top:0;
right:0;
background:#ff7f50;
color:white;
padding:20px;
}

.badge{
background:red;
color:white;
border-radius:50%;
padding:2px 6px;
font-size:12px;
}

.cart{
position:fixed;
top:0;
right:-350px;
width:300px;
height:100%;
background:white;
box-shadow:-2px 0 5px rgba(0,0,0,0.2);
padding:15px;
overflow:auto;
transition:0.3s;
}

input{
width:100%;
padding:5px;
margin-top:5px;
}

button{
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">🛍 Alshabila Hijab Collection</div>
<div class="promo">
    <span>🔥 PROMO BESAR SETIAP HARI 🔥</span></div>

<div class="container" id="productList"></div>

<div class="cart-btn" onclick="toggleCart()">
🛒 Keranjang <span class="badge" id="cartCount">0</span>
</div>

<div class="cart" id="cart">
<span class="close-cart" onclick="toggleCart()">✖</span>
<h3>Keranjang</h3>
<div id="cartItems"></div>

<p>Total Harga: Rp <span id="totalHarga">0</span></p>

<input type="number" id="bayar" placeholder="Masukkan uang bayar" oninput="hitungKembalian()">
<p>Kembalian: Rp <span id="kembalian">0</span></p>

<button onclick="checkoutWA()" style="background:green;color:white;width:100%;padding:8px;border:none;">
Checkout WhatsApp
</button>

<button onclick="clearCart()" style="background:red;color:white;width:100%;padding:8px;border:none;margin-top:5px;">
Hapus Semua
</button>

</div>

<script>

let products=[
["Hijab Sport", 15000, "images/hijab1.jpeg"],
["Pasmina Viscose", 40000, "images/hijab2.jpeg"],
["pasmina cruty", 30000, "images/hijab3.jpeg"],
["segi empat voal", 15000, "images/hijab4.jpeg"],
[" segi 4 bella square", 10000, "images/hijab5.jpeg"],
["segi empat motif", 20000, "images/hijab6.jpeg"],
["pasmina plisket", 35000, "images/hijab7.jpeg"],
["hijab satin", 30000, "images/hijab8.jpeg"],
["khimer panjang",30000, "images/hijab9.jpeg"],
["hijab instan daily",45000, "images/hijab10.jpeg"],
["pasmina shimer shilk",50000, "images/hijab11.jpeg"],
["pashmina cashmere turki",40000, "images/hijab12.jpeg"],
["hijab bergo motif",20000, "images/hijab13.jpeg"],
["hijab instan tali",20000, "images/hijab14.jpeg"],
["hijab pasmina instan",45000, "images/hijab15.jpeg"],
["hijab sekolah",30000, "images/hijab16.jpeg"],
["ciput tali iner",18000, "images/hijab17.jpeg"],
["cepol ubur ubur",10000, "images/hijab18.jpeg"],
["ciput cepol",15000, "images/hijab19.jpeg"]


];

let cart={};

function render(){
let list=document.getElementById("productList");
list.innerHTML="";

products.forEach((p,i)=>{
list.innerHTML+=`
<div class="product">
<img src="${p[2]}" alt="${p[0]}">
<div class="info">
<b>${p[0]}</b><br>
Rp${p[1]}
<div class="qty">
<button onclick="kurang(${i})">-</button>
<span id="qty${i}">0</span>
<button onclick="tambah(${i})">+</button>
</div>
</div>
<div class="check" id="check${i}">✔</div>
</div>
`;
});
}
render();

function tambah(i){
let nama=products[i][0];
cart[nama]=(cart[nama]||0)+1;
document.getElementById("qty"+i).innerText=cart[nama];
document.getElementById("check"+i).style.display="block";
updateCart();
}

function kurang(i){
let nama=products[i][0];
if(cart[nama]){
cart[nama]--;
document.getElementById("qty"+i).innerText=cart[nama];
if(cart[nama]==0){
delete cart[nama];
document.getElementById("check"+i).style.display="none";
}
updateCart();
}
}

function updateCart(){
let total=0;
let html="";
let count=0;

for(let nama in cart){
let harga=products.find(p=>p[0]==nama)[1];
let qty=cart[nama];
total+=harga*qty;
count+=qty;
html+=`${nama} (${qty}) - Rp${harga*qty}<br>`;
}

document.getElementById("cartItems").innerHTML=html;
document.getElementById("totalHarga").innerText=total;
document.getElementById("cartCount").innerText=count;
}

function toggleCart(){
let c=document.getElementById("cart");
c.style.right=(c.style.right=="0px")?"-350px":"0px";
}

function hitungKembalian(){
let bayar=parseInt(document.getElementById("bayar").value)||0;
let total=parseInt(document.getElementById("totalHarga").innerText)||0;
document.getElementById("kembalian").innerText=bayar-total;
}

function checkoutWA(){

if(Object.keys(cart).length===0){
alert("Keranjang masih kosong!");
return;
}

let totalHarga = 0;
let pesan = "";

for(let nama in cart){
let harga = products.find(p=>p[0]==nama)[1];
let qty = cart[nama];
totalHarga += harga * qty;
pesan += `${nama} x${qty} = Rp${harga*qty}%0A`;
}

let text =
`Halo Admin,%0A%0ASaya ingin pesan:%0A${pesan}%0ATotal: Rp${totalHarga}`;

window.open("https://wa.me/6282121710372?text="+text);
}

function clearCart(){
cart={};
updateCart();
document.getElementById("bayar").value="";
document.getElementById("kembalian").innerText=0;
document.querySelectorAll("[id^='qty']").forEach(e=>e.innerText=0);
document.querySelectorAll(".check").forEach(e=>e.style.display="none");
}

</script>

</body>
</html>
